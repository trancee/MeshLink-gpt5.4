name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting
        run: ./gradlew :meshlink:ktfmtCheck

      - name: Run detekt
        run: ./gradlew :meshlink:detekt

      - name: Run JVM and Android host tests
        run: ./gradlew :meshlink:jvmTest :meshlink:androidHostTest

      - name: Verify coverage
        run: ./gradlew :meshlink:koverVerify :meshlink:koverLogJvm :meshlink:koverLogAndroid

      - name: Verify JVM binary compatibility
        run: ./gradlew :meshlink:jvmApiCheck

      - name: Run CI benchmark suite
        run: ./gradlew :meshlink:jvmCiBenchmark

  ios-device-packaging:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile iOS device target
        run: ./gradlew :meshlink:compileKotlinIosArm64

      - name: Verify full binary compatibility on macOS
        run: ./gradlew :meshlink:apiCheck

      - name: Assemble release XCFramework
        run: ./gradlew :meshlink:assembleMeshLinkReleaseXCFramework

      - name: Package XCFramework for SwiftPM validation
        run: ./scripts/package-xcframework.sh

      - name: Verify packaged release artifacts
        run: ./scripts/verify-publish.sh meshlink/build/XCFrameworks/release
