---
# Continuous integration workflow that validates shared code on Linux
# and release-shaped Apple packaging on macOS.
name: ci

'on':
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Primary Linux verification lane. Run the remediation-required
  # checks explicitly so the workflow contract stays visible in CI logs
  # and aligned with the spec.
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Run explicit remediation quality gate
        run: >-
          ./gradlew
          :meshlink:ktfmtCheck
          :meshlink:detekt
          :meshlink:jvmTest
          :meshlink:androidHostTest
          :meshlink:koverVerify
          :meshlink:apiCheck
          :meshlink:jvmCiBenchmark

  # macOS verification lane that proves the Apple artifact still
  # assembles into the SwiftPM-consumable XCFramework package while also
  # exercising the cross-target API baseline on an Apple runner.
  ios-device-packaging:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Run consolidated iOS packaging gate
        run: ./gradlew :meshlink:iosPackagingGate

      - name: Package XCFramework for SwiftPM validation
        run: ./scripts/package-xcframework.sh

      - name: Verify packaged release artifacts
        run: ./scripts/verify-publish.sh meshlink/build/XCFrameworks/release
