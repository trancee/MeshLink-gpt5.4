# Continuous integration workflow that validates shared code on Linux and release-shaped
# Apple packaging on macOS.
name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Primary Linux verification lane. The Gradle task aggregates formatting, static
  # analysis, tests, coverage, API checks, and CI-shortened benchmarks.
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Run consolidated quality gate
        run: ./gradlew :meshlink:ciQualityGate

  # macOS verification lane that proves the Apple artifact still assembles into the
  # SwiftPM-consumable XCFramework package.
  ios-device-packaging:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Run consolidated iOS packaging gate
        run: ./gradlew :meshlink:iosPackagingGate

      - name: Package XCFramework for SwiftPM validation
        run: ./scripts/package-xcframework.sh

      - name: Verify packaged release artifacts
        run: ./scripts/verify-publish.sh meshlink/build/XCFrameworks/release
