---
# Weekly and PR-triggered CodeQL security scanning for workflow, native,
# and JVM/Kotlin surfaces.
name: codeql

'on':
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-actions:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      # This repository already has GitHub-managed CodeQL default setup enabled.
      # Avoid uploading a second advanced-configuration SARIF from the PR path,
      # because GitHub rejects duplicate advanced uploads while default setup is
      # active.
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions
          upload: never

  analyze-c-cpp:
    name: Analyze (c-cpp)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Verify repository has no C or C++ sources to scan
        run: >-
          if find .
          \( -path './.git' -o -path './.gradle' -o -path './build' -o -path './meshlink/build' \)
          -prune
          -o
          -type f
          \( -name '*.c' -o -name '*.cc' -o -name '*.cpp' -o -name '*.cxx' -o -name '*.h' -o -name '*.hh' -o -name '*.hpp' -o -name '*.hxx' \)
          -print
          | grep -q .; then
            echo 'C/C++ sources were detected. Revisit CodeQL configuration and coordinate it with GitHub default setup before merging.' >&2;
            exit 1;
          fi

  analyze-java-kotlin:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build Kotlin targets for CodeQL extraction
        run: >-
          ./gradlew
          :meshlink:compileKotlinJvm
          :meshlink:compileAndroidMain
          :meshlink:compileKotlinIosArm64

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:java-kotlin
          upload: never
