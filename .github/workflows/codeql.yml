name: codeql

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          - java-kotlin
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.35.2
        with:
          languages: ${{ matrix.language }}

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build Kotlin sources for CodeQL
        if: matrix.language == 'java-kotlin'
        run: ./gradlew :meshlink:compileKotlinJvm :meshlink:compileAndroidMain :meshlink:compileKotlinIosArm64

      - name: Analyze
        uses: github/codeql-action/analyze@v4.35.2
        with:
          category: /language:${{ matrix.language }}
