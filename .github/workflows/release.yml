# Release workflow that publishes Maven artifacts first, then packages and uploads the
# SwiftPM/XCFramework distribution once the repository publications succeeded.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish (for example v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Publish the Android/JVM/KMP Maven artifacts from Linux where the shared release
  # verification path is fastest and easiest to cache.
  publish-android:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Publish Android, JVM, and multiplatform metadata
        run: >-
          ./gradlew
          :meshlink:publishAndroidPublicationToOSSRHRepository
          :meshlink:publishJvmPublicationToOSSRHRepository
          :meshlink:publishKotlinMultiplatformPublicationToOSSRHRepository

  # Publish the iOS Maven publication separately on macOS because Apple binaries must
  # be assembled on an Apple runner.
  publish-ios:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Publish iOS artifacts
        run: ./gradlew :meshlink:publishIosArm64PublicationToOSSRHRepository

  # Only package and upload the XCFramework after the Maven publications completed so
  # release assets and repository metadata describe the same version.
  publish-xcframework:
    needs:
      - publish-android
      - publish-ios
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Assemble release XCFramework
        run: ./gradlew :meshlink:assembleMeshLinkReleaseXCFramework

      - name: Package XCFramework
        id: package_xcframework
        run: ./scripts/package-xcframework.sh

      - name: Verify Package.swift release metadata
        run: >-
          ./scripts/update-package-swift.sh
          --verify
          --version "${RELEASE_TAG}"
          --checksum "${{ steps.package_xcframework.outputs.checksum }}"
          --repository "${GITHUB_REPOSITORY}"

      - name: Verify packaged release artifacts
        run: ./scripts/verify-publish.sh meshlink/build/XCFrameworks/release

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            meshlink/build/XCFrameworks/release/MeshLink.xcframework.zip
            meshlink/build/XCFrameworks/release/MeshLink.xcframework.zip.checksum
