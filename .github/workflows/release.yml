name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-android:
    runs-on: ubuntu-latest
    env:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish Android artifacts
        run: ./gradlew :meshlink:publishAndroidPublicationToOSSRHRepository

  publish-ios:
    runs-on: macos-latest
    env:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish iOS artifacts
        run: ./gradlew :meshlink:publishIosArm64PublicationToOSSRHRepository

  publish-xcframework:
    needs:
      - publish-android
      - publish-ios
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble release XCFramework
        run: ./gradlew :meshlink:assembleMeshLinkReleaseXCFramework

      - name: Zip XCFramework
        run: |
          cd meshlink/build/XCFrameworks/release
          ditto -c -k --sequesterRsrc --keepParent MeshLink.xcframework MeshLink.xcframework.zip

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeshLink.xcframework
          path: meshlink/build/XCFrameworks/release/MeshLink.xcframework.zip
