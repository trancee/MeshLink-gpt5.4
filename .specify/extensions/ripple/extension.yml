schema_version: "1.0"

extension:
  id: "ripple"
  name: "Ripple"
  version: "1.0.0"
  description: "Detect side effects that tests can't catch after implementation — surface hidden ripple effects across 9 analysis categories"
  author: "chordpli"
  repository: "https://github.com/chordpli/spec-kit-ripple"
  license: "MIT"
  homepage: "https://github.com/chordpli/spec-kit-ripple"

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: "speckit.ripple.scan"
      file: "commands/speckit.ripple.scan.md"
      description: "Analyze implementation for untested side effects and generate ripple-report.md"
    - name: "speckit.ripple.resolve"
      file: "commands/speckit.ripple.resolve.md"
      description: "Interactively resolve ripple findings one by one — review cause, choose a fix strategy, and apply"
    - name: "speckit.ripple.check"
      file: "commands/speckit.ripple.check.md"
      description: "Re-verify ripple report items and update resolution status"

hooks:
  after_implement:
    command: "speckit.ripple.scan"
    optional: true
    prompt: "Scan for untested side effects?"
    description: "Auto-scan for ripple effects after implementation"

tags:
  - "side-effects"
  - "post-implementation"
  - "analysis"
  - "quality"
  - "risk-detection"