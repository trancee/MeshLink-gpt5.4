# Git Branching Workflow Extension Configuration
# Copied to .specify/extensions/git/git-config.yml on install

# Branch numbering strategy: "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization.
# MUST follow Conventional Commits.
init_commit_message: "chore: initialize repository"

# Auto-commit before/after core commands.
# Set "default" to enable for all commands, then override per-command.
# Each key can be true/false. Message MUST follow Conventional Commits.
auto_commit:
  default: false
  before_clarify:
    enabled: false
    message: "chore: checkpoint before clarification"
  before_plan:
    enabled: false
    message: "chore: checkpoint before planning"
  before_tasks:
    enabled: false
    message: "chore: checkpoint before task generation"
  before_implement:
    enabled: false
    message: "chore: checkpoint before implementation"
  before_checklist:
    enabled: false
    message: "chore: checkpoint before checklist generation"
  before_analyze:
    enabled: false
    message: "chore: checkpoint before analysis"
  before_taskstoissues:
    enabled: false
    message: "chore: checkpoint before issue sync"
  after_constitution:
    enabled: false
    message: "docs: amend constitution"
  after_specify:
    enabled: false
    message: "docs: add specification"
  after_clarify:
    enabled: false
    message: "docs: clarify specification"
  after_plan:
    enabled: false
    message: "docs: add implementation plan"
  after_tasks:
    enabled: false
    message: "docs: add task breakdown"
  after_implement:
    enabled: false
    message: "chore: checkpoint implementation progress"
  after_checklist:
    enabled: false
    message: "docs: add checklist"
  after_analyze:
    enabled: false
    message: "docs: add analysis report"
  after_taskstoissues:
    enabled: false
    message: "chore: sync tasks to issues"
