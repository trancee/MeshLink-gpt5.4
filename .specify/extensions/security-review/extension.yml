schema_version: '1.0'
extension:
  id: 'security-review'
  name: 'Security Review'
  version: '1.3.0'
  description: 'Full-project secure-by-design security audits plus staged, branch/PR, plan, task, follow-up, and apply reviews'
  author: 'Spec-Kit Security Team'
  repository: 'https://github.com/DyanGalih/spec-kit-security-review'
  license: 'MIT'
  homepage: 'https://github.com/DyanGalih/spec-kit-security-review'
requires:
  speckit_version: '>=0.1.0'
provides:
  commands:
    - name: 'speckit.security-review.audit'
      file: 'prompts/security-review.prompt.md'
      description: 'Perform comprehensive full-project security audit of the codebase'
    - name: 'speckit.security-review.staged'
      file: 'prompts/security-review-staged.prompt.md'
      description: 'Security review of staged changes only (git diff --cached)'
    - name: 'speckit.security-review.branch'
      file: 'prompts/security-review-branch.prompt.md'
      description: 'Security review of branch, pull request, or merge request diffs compared to a base branch'
    - name: 'speckit.security-review.plan'
      file: 'prompts/security-review-plan.prompt.md'
      description: 'Security review of Spec-Kit plan artifacts and supporting design docs'
    - name: 'speckit.security-review.tasks'
      file: 'prompts/security-review-tasks.prompt.md'
      description: 'Security review of Spec-Kit task artifacts and implementation sequencing'
    - name: 'speckit.security-review.followup'
      file: 'prompts/security-review-followup.prompt.md'
      description: 'Create remediation plans or technical-debt tasks from security review findings'
    - name: 'speckit.security-review.apply'
      file: 'prompts/security-review-apply.prompt.md'
      description: 'Apply approved security follow-up items into tasks.md and plan.md'
tags:
  - 'security'
  - 'devsecops'
  - 'audit'
  - 'owasp'
  - 'compliance'
